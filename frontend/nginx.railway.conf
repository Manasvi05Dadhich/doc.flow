server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for external upstream hostnames (Cloudflare + Google)
    resolver 1.1.1.1 8.8.8.8 valid=30s;
    resolver_timeout 5s;

    # Allow file uploads up to 15 MB
    client_max_body_size 15m;

    location /api/ {
        proxy_pass ${BACKEND_UPSTREAM}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SNI — required for Cloudflare/Render HTTPS upstreams
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # Timeouts for file upload processing
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffering for upload stability
        proxy_request_buffering on;
        proxy_buffering on;
    }

    location = /health {
        proxy_pass ${BACKEND_UPSTREAM}/health;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SNI
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    location / {
        try_files $uri /index.html;
    }
}
